        score: 96
    }

/* ── AI 분석 태그 ── */
const TAGS = [
    { label: '✨ 내 취향에 맞는 제품 추천', query: '내 취향을 바탕으로 제품을 추천해줘' },
    { label: '💰 예산에 맞는 최적 제품 찾기', query: '예산 내에서 가장 좋은 제품을 찾아줘' },
    { label: '⚖️ 두 제품 비교 분석', query: '두 제품을 비교해서 추천해줘' },
];

/* ── Waitlist 모달 ── */
const WaitlistModal = ({ onClose }) => {
    const [email, setEmail] = useState('');
    const [step, setStep] = useState('form'); // form | saving | success
    const [error, setError] = useState('');

    const handleSubmit = async (e) => {
        if (e && e.preventDefault) e.preventDefault();
        if (!email.trim() || !email.includes('@') || !email.includes('.')) {
            setError('올바른 이메일 주소를 입력해 주세요.');
            return;
        }
        setError('');
        setStep('saving');
        try {
            await fetch(
                'https://script.google.com/macros/s/AKfycbwBZmcjMMkceuZvDuIKYrli1cTMGr8ZIwZZzgSj1736a5KNTrmIellLw8RW_yj7TNg/exec',
                { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) }
            );
        } catch(err) { console.error(err); }
        setStep('success');
    };

    return (
        <div className="modal-bg" onClick={onClose}>
            <div className="modal-box" onClick={e => e.stopPropagation()}>
                <button className="modal-close" onClick={onClose}>✕</button>

                {/* 저장 중 */}
                {step === 'saving' && (
                    <div className="center-wrap">
                        <div style={{ width:68, height:68, margin:'0 auto 24px', display:'flex', alignItems:'center', justifyContent:'center' }}>

                        <h2 style={{ fontSize:20 }}>저장 중입니다...</h2>
                        <p style={{ marginTop:8 }}>잠시만 기다려 주세요 🙏</p>
                    </div>
                )}

                {/* 폼 */}
                {step === 'form' && (
                    <>
                        <div className="modal-badge">✦ 서비스 출시 예정</div>
                        <h2>TRYGO가 곧<br/>출시됩니다 🚀</h2>
                        <p className="modal-desc">
                            에이션틱 AI 쇼핑 어드바이저의 얼리 액세스를 신청하세요.<br/>
                            <strong style={{ color:'#4F46E5' }}>출시 즉시 특별 할인 코드</strong>를 이메일로 보내드립니다.
                        </p>
                        {[
                            ['✦', '얼리버드 전용 20% 할인 코드 제공'],
                            ['⚡', '에이션틱 AI 베타 기능 우선 체험'],
                            ['★', '프리미엄 멤버십 1개월 무료'],
                        ].map(([icon, text]) => (
                            <div className="benefit-row" key={text}>
                                <div className="benefit-icon">{icon}</div>
                                <span className="benefit-text">{text}</span>
                            </div>
                        ))}
                        <input
                            className="email-input"
                            type="email"
                            placeholder="이메일 주소를 입력하세요"
                            value={email}
                            onChange={e => { setEmail(e.target.value); setError(''); }}
                            onKeyDown={e => e.key === 'Enter' && handleSubmit()}
                        />
                        {error && <p className="email-error">{error}</p>}
                        <button className="submit-btn" onClick={handleSubmit}>✨ 할인 코드 받기</button>
                        <p className="modal-note">스팸 없음 · 언제든 수신 거부 가능</p>
                    </>
                )}

                {/* 성공 */}
                {step === 'success' && (
                    <div className="center-wrap">
                        <div className="success-icon">🎉</div>
                        <h2>등록 완료!</h2>
                        <p><strong style={{ color:'#4F46E5' }}>{email}</strong>으로<br/>출시 알림과 할인 코드를 보내드릴게요.</p>
                        <p style={{ color:'#94a3b8', fontSize:12, marginTop:8 }}>빠른 출시를 위해 열심히 준비 중입니다 🙏</p>
                        <button className="close-btn" onClick={onClose}>닫기</button>
                    </div>
                )}
            </div>
        </div>
    );
};

/* ── 메인 앱 ── */
const App = () => {
    const [view, setView] = useState('home');   // home | loading | result
    const [query, setQuery] = useState('');
    const [aiText, setAiText] = useState('');
    const [showModal, setShowModal] = useState(false);

    /* Claude AI 호출 */
    const callAI = async (q) => {
        setView('loading');
        try {
            const res = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 1000,
                    system: `당신은 TRYGO 플랫폼의 AI 쇼핑 어드바이저 '에이션틱 AI'입니다.
사용자의 쇼핑 질문에 간결하고 유용한 한국어 답변을 해주세요.

다음 형식으로 작성하세요:
[핵심 추천]
2~3문장으로 요약

[추천 이유]
1. 이유 하나
2. 이유 둘
3. 이유 셋

[가격 가이드]
적정 가격대 한 줄`,
                    messages: [{ role: 'user', content: q }]
                })
            });
            const data = await res.json();
            const text = data?.content?.[0]?.text || '분석 결과를 가져오지 못했습니다.';
            setAiText(text);
        } catch(err) {
            setAiText('현재 AI 분석을 불러올 수 없습니다.\n잠시 후 다시 시도해 주세요.');
        }
        setView('result');
    };

    const handleSearch = () => { if (query.trim()) callAI(query); };
    const handleTag = (q) => { setQuery(q); callAI(q); };
    const reset = () => { setView('home'); setQuery(''); setAiText(''); };

    return (
        <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column' }}>
            {showModal && <WaitlistModal onClose={() => setShowModal(false)} />}

            {/* 네비 */}
            <nav>
                <div className="nav-inner">
                    <div className="logo" onClick={reset}>
                        <div className="logo-icon"><CartIcon /></div>
                        <div>
                            <div className="logo-name">TRYGO</div>
                            <div className="logo-sub">Powered by Asiantic AI</div>
                        </div>
                    </div>
                    <div className="hidden-mobile" style={{ display:'flex', gap:36 }}>
                        {['에이션틱 테크', '가격 지수', '트렌드 분석'].map(l => (
                            <a key={l} href="#" style={{ fontSize:12, fontWeight:700, color:'#64748b', textDecoration:'none', letterSpacing:'0.08em', textTransform:'uppercase' }}>{l}</a>
                        ))}
                    </div>
                    <button className="btn-waitlist" onClick={() => setShowModal(true)}>시작하기</button>
                </div>
            </nav>

            <div style={{ flex:1 }}>

                {/* 홈 */}
                {view === 'home' && (
                    <div className="fade-up">
                        <div className="hero">
                            <div className="hero-badge">✦ Asiantic AI Engine</div>
                            <h1>상품 검색의 새로운 방식,<br/><span className="gradient-text">AI와 함께 고민해보세요. </span></h1>
                            <p>실시간 데이터를 분석해 당신만을 위한<br/>최적의 구매 가이드를 제안합니다.</p>

                            <div className="search-wrap">
                                <span className="search-icon"><BrainIcon /></span>
                                <input
                                    className="search-input"
                                    type="text"
                                    placeholder="에이션틱 AI에게 분석을 요청하세요..."
                                    value={query}
                                    onChange={e => setQuery(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleSearch()}
                                />
                                <button className="search-btn" onClick={handleSearch}>분석 요청</button>
                                <button className="search-btn-mobile" onClick={handleSearch}>AI 분석 시작</button>
                            </div>

                            <div className="tags">
                                {TAGS.map(({ label, query: q }) => (
                                    <button key={label} className="tag" onClick={() => handleTag(q)}>{label}</button>
                                ))}
                            </div>
                        </div>
                    </div>
                )}

                {/* 로딩 */}
                {view === 'loading' && (
                    <div className="loading-wrap fade-up">
                        <div className="loading-icon">
                            <div className="spinning"><SpinIcon /></div>
                        </div>
                        <h2>에이션틱 AI 엔진이<br/>실시간 정보를 스캔하고 있습니다</h2>
                        <p className="pulsing">Asiantic Reasoning Algorithm</p>
                    </div>
                )}

                {/* 결과 */}
                {view === 'result' && (
                    <div className="result-wrap fade-up">
                        <button className="back-btn" onClick={reset}>
                            <ArrowIcon /> 다시 질문하기
                        </button>

                        {/* AI 답변 카드 */}
                        <div className="ai-card">
                            <div className="ai-card-header">
                                <div className="ai-avatar"><BrainIcon size={22} color="white" /></div>
                                <div>
                                    <div className="ai-card-title">에이션틱 AI 분석 리포트</div>
                                    <div className="ai-card-sub">"{query}"</div>
                                </div>
                            </div>
                            <div className="ai-answer">{aiText}</div>
                        </div>

                        {/* 상품 큐레이션 */}
                        <div className="product-section">
                            <h3><SparkIcon size={18} /> 에이션틱 AI 큐레이션</h3>
                            {PRODUCTS.map(p => (
                                <div className="product-card" key={p.id}>
                                    <img className="product-img" src={p.image} alt={p.name} />
                                    <div className="product-info">
                                        <div>
                                            <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:6 }}>
                                                {p.tags.map(t => (
                                                    <span key={t} className="product-tag">{t}</span>
                                                ))}
                                            </div>
                                            <div className="product-name">{p.name}</div>
                                            <div className="product-score">Asiantic {p.score}% · ★ 4.9</div>
                                        </div>
                                        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:10 }}>
                                            <div className="product-price">{p.price}</div>
                                            <button
                                                style={{ padding:'8px 18px', background:'#4F46E5', color:'white', border:'none', borderRadius:10, fontWeight:700, fontSize:13, cursor:'pointer' }}
                                                onMouseEnter={e => e.currentTarget.style.background='#4338CA'}
                                                onMouseLeave={e => e.currentTarget.style.background='#4F46E5'}
                                            >보러가기</button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* CTA */}
                        <div className="cta-box">
                            <h3>에이션틱 AI와<br/>더 깊은 대화를 나누세요.</h3>
                            <p>에이션틱 AI의 추론 모델은 당신의 취향과 라이프스타일을<br/>분석하여 가장 완벽한 쇼핑 가이드를 제공합니다.</p>
                            <button className="cta-btn" onClick={() => setShowModal(true)}>✨ 에이션틱 AI와 채팅하기</button>
                        </div>
                    </div>
                )}
            </div>

            {/* 푸터 */}
            <footer>
                <div className="footer-inner">
                    <div className="footer-logo">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4F46E5" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                            <circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/>
                            <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
                        </svg>
                        <span style={{ fontSize:20, fontWeight:700, color:'#4F46E5', letterSpacing:'-0.04em' }}>TRYGO</span>
                    </div>
                    <p className="footer-copy">© 2025 TRYGO &amp; ASIANTIC AI. ALL RIGHTS RESERVED.</p>
                    <div className="footer-links">
                        {['Privacy','Terms','Contact'].map(l => <a key={l} href="#">{l}</a>)}
                    </div>
                </div>
            </footer>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
