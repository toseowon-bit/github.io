                            <div className="hero-badge">✦ Asiantic AI Engine</div>
                            <h1>쇼핑의 정답,<br/><span className="gradient-text">에이션틱 AI</span></h1>
                            <p>실시간 데이터를 분석해 당신만을 위한<br/>최적의 구매 가이드를 제안합니다.</p>
                            <div className="search-wrap">
                                <span className="search-icon"><BrainSVG /></span>
                                <input className="search-input" type="text" placeholder="무엇을 찾고 계세요?"
                                    value={query} onChange={e => setQuery(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleSearch()}
                                />
                                <button className="search-btn" onClick={handleSearch}>AI 분석</button>
                                <button className="search-btn-mobile" onClick={handleSearch}>AI 분석 시작</button>
                            </div>
                            <div className="tags">
                                {["아이폰 16 자급제","로봇청소기 추천","에스프레소 머신","다이슨 에어랩"].map(tag => (
                                    <button key={tag} className="tag" onClick={() => { setQuery(tag); callAI(tag); }}>{tag}</button>
                                ))}
                            </div>
                        </div>
                    </div>
                )}

                {view === 'loading' && (
                    <div className="loading-wrap fade-up">
                        <div className="loading-icon">
                            <div className="spin"><SpinSVG /></div>
                        </div>
                        <h2>에이션틱 AI가 분석 중입니다</h2>
                        <p className="pulse">Asiantic Reasoning Algorithm</p>
                    </div>
                )}

                {view === 'result' && (
                    <div className="result-wrap fade-up">
                        <button className="back-btn" onClick={reset}>
                            <ArrowSVG /> 다시 질문하기
                        </button>
                        <div className="ai-card">
                            <div className="ai-card-header">
                                <div className="ai-avatar"><BrainSVG size={20} color="white" /></div>
                                <div>
                                    <div className="ai-card-title">에이션틱 AI 분석</div>
                                    <div className="ai-card-sub">"{query}"</div>
                                </div>
                            </div>
                            <div className="ai-answer">{aiText}</div>
                        </div>
                        <div className="product-section">
                            <h3>✦ 에이션틱 AI 큐레이션</h3>
                            {products.map(p => (
                                <div className="product-card" key={p.id}>
                                    <img className="product-img" src={p.image} alt={p.name} />
                                    <div className="product-info">
                                        <div>
                                            <span className="product-tag">{p.tag} {p.score}%</span>
                                            <div className="product-name">{p.name}</div>
                                        </div>
                                        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                                            <div className="product-price">{p.price}</div>
                                            <span className="product-score">★ 4.9</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="cta-box">
                            <h3>에이션틱 AI와<br/>더 깊은 대화를 나누세요</h3>
                            <p>취향과 라이프스타일을 분석해<br/>완벽한 쇼핑 가이드를 제공합니다.</p>
                            <button className="cta-btn" onClick={() => setShowModal(true)}>✨ 얼리 액세스 신청</button>
                        </div>
                    </div>
                )}
            </div>

            <footer>
                <div className="footer-inner">
                    <div className="footer-logo">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4F46E5" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                            <circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/>
                            <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
                        </svg>
                        <span style={{fontSize:18, fontWeight:700, color:'#4F46E5', letterSpacing:'-0.03em'}}>TRYGO</span>
                    </div>
                    <p className="footer-copy">© 2025 TRYGO &amp; ASIANTIC AI. ALL RIGHTS RESERVED.</p>
                    <div className="footer-links">
                        {['Privacy','Terms','Contact'].map(l => <a key={l} href="#">{l}</a>)}
                    </div>
                </div>
            </footer>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>

</body>
</html>
