<body class="hero-bg">

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        /* ─────────────────────────────────────────

        const ICONS = {

            BrainCircuit: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.896a4 4 0 0 1 .585-.396"/><path d="M19.938 10.5a4 4 0 0 1 .585.396"/><path d="M6 18a4 4 0 0 1-1.967-.516"/><path d="M19.967 17.484A4 4 0 0 1 18 18"/></svg>`,
            ArrowLeft: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>`,
            Sparkles: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>`,
            Volume2: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`,
            X: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>`,
            Star: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
        };

        const Icon = ({ name, size = 20, color = "currentColor", className = "" }) => {
            const svg = ICONS[name];
            if (!svg) return null;
            // svg 태그에 width/height/color 속성 주입
            const injected = svg
                .replace('<svg ', `<svg width="${size}" height="${size}" color="${color}" `)
                .replace('stroke="currentColor"', `stroke="${color}"`);
            return (
                <span
                    className={`icon-svg ${className}`}
                    style={{ width: size, height: size, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}
                    dangerouslySetInnerHTML={{ __html: injected }}
                />
            );
        };

        /* ─────────────────────────────────────────
           API 설정
        ───────────────────────────────────────── */
        const apiKey = "";

        /* ─────────────────────────────────────────
           WAV 헤더 생성 유틸
        ───────────────────────────────────────── */
        const createWavBuffer = (pcmBuffer, sampleRate = 24000) => {
            const header = new ArrayBuffer(44);
            const dv = new DataView(header);
            const pcmLength = pcmBuffer.byteLength;
            const writeStr = (offset, str) => {
                for (let i = 0; i < str.length; i++) dv.setUint8(offset + i, str.charCodeAt(i));
            };
            writeStr(0, 'RIFF');
            dv.setUint32(4, 36 + pcmLength, true);
            writeStr(8, 'WAVE');
            writeStr(12, 'fmt ');
            dv.setUint32(16, 16, true);
            dv.setUint16(20, 1, true);   // PCM
            dv.setUint16(22, 1, true);   // mono
            dv.setUint32(24, sampleRate, true);
            dv.setUint32(28, sampleRate * 2, true);
            dv.setUint16(32, 2, true);
            dv.setUint16(34, 16, true);
            writeStr(36, 'data');
            dv.setUint32(40, pcmLength, true);
            const output = new Uint8Array(44 + pcmLength);
            output.set(new Uint8Array(header), 0);
            output.set(new Uint8Array(pcmBuffer), 44);
            return output;
        };

        /* ─────────────────────────────────────────
           재시도 fetch
        ───────────────────────────────────────── */
        const fetchWithRetry = async (url, options, retries = 3, delay = 1000) => {
            for (let i = 0; i <= retries; i++) {
                try {
                    const res = await fetch(url, options);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return await res.json();
                } catch (err) {
                    if (i === retries) throw err;
                    await new Promise(r => setTimeout(r, delay * (i + 1)));
                }
            }
        };

        /* ─────────────────────────────────────────
           샘플 상품 데이터
        ───────────────────────────────────────── */
        const products = [
            { id: 1, name: "드롱기 데디카 메탈릭 EC685", price: "248,000원", image: "https://images.unsplash.com/photo-1579992357154-faf4bfe95b3d?w=400&q=80", tags: ["에이션틱 AI 1순위", "슬림 디자인"], mall: "쿠팡", score: 98 },
            { id: 2, name: "가찌아 클래식 프로 2024", price: "589,000원", image: "https://images.unsplash.com/photo-1559056199-641a0ac8b55e?w=400&q=80", tags: ["고성능 추론 결과", "전문가용"], mall: "네이버스토어", score: 94 }
        ];

        /* ─────────────────────────────────────────
           메인 앱
        ───────────────────────────────────────── */
        /* ─────────────────────────────────────────
           Waitlist 모달 컴포넌트
        ───────────────────────────────────────── */
        const WaitlistModal = ({ onClose }) => {
            const [email, setEmail] = useState('');
            const [step, setStep] = useState('form'); // 'form' | 'success'
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!email.trim() || !email.includes('@') || !email.includes('.')) {
                    setError('올바른 이메일 주소를 입력해 주세요.');
                    return;
                }
                setError('');
                try {
                    await fetch('https://script.google.com/macros/s/AKfycbwBZmcjMMkceuZvDuIKYrli1cTMGr8ZIwZZzgSj1736a5KNTrmIellLw8RW_yj7TNg/exec', {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                } catch (err) {
                    console.error('저장 오류:', err);
                }
                setStep('success');
            };

            return (
                <div
                    onClick={onClose}
                    style={{
                        position:'fixed', inset:0, zIndex:1000,
                        background:'rgba(15,23,42,0.6)',
                        backdropFilter:'blur(8px)', WebkitBackdropFilter:'blur(8px)',
                        display:'flex', alignItems:'center', justifyContent:'center',
                        padding:24,
                        animation:'fadeInBg 0.3s ease both'
                    }}
                >
                    <div
                        onClick={e => e.stopPropagation()}
                        style={{
                            background:'white', borderRadius:40, padding:'52px 48px',
                            maxWidth:520, width:'100%', position:'relative',
                            boxShadow:'0 40px 80px -20px rgba(79,70,229,0.25)',
                            animation:'slideUpModal 0.35s cubic-bezier(0.34,1.56,0.64,1) both'
                        }}
                    >
                        {/* 닫기 버튼 */}
                        <button
                            onClick={onClose}
                            style={{ position:'absolute', top:20, right:20, width:36, height:36, borderRadius:12, border:'1px solid #e2e8f0', background:'white', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}
                            onMouseEnter={e=>{e.currentTarget.style.background='#f8fafc';}}
                            onMouseLeave={e=>{e.currentTarget.style.background='white';}}
                        >
                            <Icon name="X" size={16} color="#64748b" />
                        </button>

                        {step === 'form' ? (
                            <>
                                {/* 상단 뱃지 */}
                                <div style={{ display:'inline-flex', alignItems:'center', gap:8, padding:'8px 16px', background:'#EEF2FF', color:'#4338CA', borderRadius:999, fontSize:11, fontWeight:900, marginBottom:28, border:'1px solid #C7D2FE', letterSpacing:'0.1em', textTransform:'uppercase' }}>
                                    <Icon name="Sparkles" size={12} color="#4338CA" />
                                    <span>서비스 출시 예정</span>
                                </div>

                                <h2 style={{ fontSize:32, fontWeight:900, letterSpacing:'-0.04em', lineHeight:1.15, marginBottom:16, color:'#0f172a' }}>
                                    TRYGO가 곧<br/>출시됩니다 🚀
                                </h2>
                                <p style={{ color:'#64748b', fontSize:16, lineHeight:1.7, fontWeight:500, marginBottom:36 }}>
                                    에이션틱 AI 쇼핑 어드바이저의 얼리 액세스를 신청하세요.<br/>
                                    <strong style={{ color:'#4F46E5' }}>출시 즉시 특별 할인 코드</strong>를 이메일로 보내드립니다.
                                </p>

                                {/* 혜택 리스트 */}
                                <div style={{ display:'flex', flexDirection:'column', gap:12, marginBottom:36 }}>
                                    {[
                                        { icon:'Sparkles', text:'얼리버드 전용 20% 할인 코드 제공' },
                                        { icon:'Cpu',      text:'에이션틱 AI 베타 기능 우선 체험' },
                                        { icon:'Star',     text:'프리미엄 멤버십 1개월 무료' },
                                    ].map(item => (
                                        <div key={item.text} style={{ display:'flex', alignItems:'center', gap:12 }}>
                                            <div style={{ width:32, height:32, background:'#EEF2FF', borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                                                <Icon name={item.icon} size={14} color="#4F46E5" />

                                        </div>
                                    ))}
                                </div>

                                {/* 이메일 입력 폼 */}
                                <form onSubmit={handleSubmit} style={{ display:'flex', flexDirection:'column', gap:12 }}>
                                    <div style={{ position:'relative' }}>
                                        <input
                                            type="email"
                                            value={email}
                                            onChange={e => { setEmail(e.target.value); setError(''); }}
                                            placeholder="이메일 주소를 입력하세요"
                                            style={{
                                                width:'100%', height:58, padding:'0 20px',
                                                borderRadius:18, border: error ? '2px solid #EF4444' : '2px solid #e2e8f0',
                                                fontSize:16, fontWeight:600, color:'#0f172a',
                                                fontFamily:'inherit', background:'#f8fafc',
                                                transition:'border-color 0.2s'
                                            }}
                                            onFocus={e=>{ if(!error) e.target.style.borderColor='#4F46E5'; }}
                                            onBlur={e=>{ if(!error) e.target.style.borderColor='#e2e8f0'; }}
                                        />
                                    </div>
                                    {error && (
                                        <p style={{ color:'#EF4444', fontSize:13, fontWeight:600, margin:0 }}>{error}</p>
                                    )}
                                    <button
                                        type="submit"
                                        style={{
                                            height:58, borderRadius:18, background:'#4F46E5',
                                            color:'white', border:'none', fontWeight:900, fontSize:17,
                                            cursor:'pointer', fontFamily:'inherit',
                                            boxShadow:'0 8px 20px rgba(79,70,229,0.3)',
                                            transition:'background 0.2s, transform 0.1s'
                                        }}
                                        onMouseEnter={e=>e.currentTarget.style.background='#4338CA'}
                                        onMouseLeave={e=>e.currentTarget.style.background='#4F46E5'}
                                        onMouseDown={e=>e.currentTarget.style.transform='scale(0.98)'}
                                        onMouseUp={e=>e.currentTarget.style.transform='scale(1)'}
                                    >✨ 할인 코드 받기</button>
                                </form>
                                <p style={{ textAlign:'center', fontSize:11, color:'#94a3b8', fontWeight:600, marginTop:16 }}>
                                    스팸 없음 · 언제든 수신 거부 가능
                                </p>
                            </>
                        ) : (
                            /* 성공 화면 */
                            <div style={{ textAlign:'center', padding:'20px 0' }}>
                                <div style={{ width:80, height:80, background:'linear-gradient(135deg,#4F46E5,#7C3AED)', borderRadius:28, display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 28px', boxShadow:'0 12px 28px rgba(79,70,229,0.3)' }}>
                                    <span style={{ fontSize:36 }}>🎉</span>
                                </div>
                                <h2 style={{ fontSize:30, fontWeight:900, letterSpacing:'-0.04em', marginBottom:16, color:'#0f172a' }}>
                                    등록 완료!
                                </h2>
                                <p style={{ color:'#64748b', fontSize:16, lineHeight:1.7, fontWeight:500, marginBottom:8 }}>
                                    <strong style={{ color:'#4F46E5' }}>{email}</strong>으로<br/>
                                    출시 알림과 할인 코드를 보내드릴게요.
                                </p>
                                <p style={{ color:'#94a3b8', fontSize:13, fontWeight:600, marginBottom:36 }}>

                                    style={{ padding:'16px 48px', background:'#0f172a', color:'white', borderRadius:18, border:'none', fontWeight:900, fontSize:16, cursor:'pointer', fontFamily:'inherit' }}

                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentView, setCurrentView] = useState('home'); // 'home' | 'loading' | 'result'
            const [searchQuery, setSearchQuery] = useState('');
            const [aiResponse, setAiResponse] = useState(null);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [showWaitlist, setShowWaitlist] = useState(false);
            const audioRef = useRef(null);

            /* AI 분석 리포트 생성 */
            const generateShoppingGuide = async (query) => {
                const systemPrompt = "당신은 TRYGO 플랫폼의 핵심 지식 엔진 '에이션틱 AI(Asiantic AI)'입니다. 당신은 단순 검색을 넘어 실시간 데이터를 논리적으로 추론하여 사용자에게 최적의 구매 경로를 제시합니다. 1. 시장 분석, 2. 에이션틱이 선정한 제품별 강점, 3. 구매 적정가 가이드를 전문적이고 지적인 톤으로 작성하세요.";
                const payload = {
                    contents: [{ parts: [{ text: `사용자 질문: ${query}` }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };
                try {
                    const result = await fetchWithRetry(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`,
                        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }
                    );
                    const text = result?.candidates?.[0]?.content?.parts?.[0]?.text || "데이터 분석 리포트를 생성하지 못했습니다.";
                    const summary = text.split('\n')[0].replace(/[*#]/g, '').trim() || "에이션틱 AI 정밀 분석 결과";
                    return { summary, fullText: text };
                } catch (err) {
                    console.error("API Error:", err);
                    return { summary: "에이션틱 엔진 일시 중단", fullText: "시스템 최적화 중입니다. 잠시 후 다시 시도해 주세요.\n\nAPI 키가 설정되지 않은 경우 런타임에서 자동으로 제공됩니다." };
                }
            };

            /* TTS 브리핑 */
            const speakText = async (text) => {
                if (isSpeaking) {
                    if (audioRef.current) { audioRef.current.pause(); audioRef.current.currentTime = 0; }
                    setIsSpeaking(false);
                    return;
                }
                setIsSpeaking(true);
                const payload = {
                    contents: [{ parts: [{ text: `에이션틱 AI의 신뢰감 있고 차분한 목소리로 리포트를 요약해줘: ${(text || '').substring(0, 350)}` }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                    }
                };
                try {
                    const result = await fetchWithRetry(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`,
                        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }
                    );
                    const base64Audio = result?.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    if (base64Audio && audioRef.current) {
                        const binary = atob(base64Audio);
                        const pcmBuffer = new ArrayBuffer(binary.length);
                        const bytes = new Uint8Array(pcmBuffer);
                        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                        const wavBytes = createWavBuffer(pcmBuffer, 24000);
                        const blob = new Blob([wavBytes], { type: 'audio/wav' });
                        const url = URL.createObjectURL(blob);
                        audioRef.current.src = url;
                        audioRef.current.onended = () => setIsSpeaking(false);
                        audioRef.current.onerror = () => setIsSpeaking(false);
                        await audioRef.current.play();
                    } else {
                        setIsSpeaking(false);
                    }
                } catch (err) {
                    console.error("TTS Error:", err);
                    setIsSpeaking(false);
                }
            };

            /* 검색 핸들러 */
            const handleSearch = async (e) => {
                e.preventDefault();
                if (!searchQuery.trim()) return;
                setCurrentView('loading');
                const guide = await generateShoppingGuide(searchQuery);
                setAiResponse(guide);
                setCurrentView('result');
            };

            /* 홈 리셋 */
            const resetHome = () => {
                setCurrentView('home');
                setSearchQuery('');
                setAiResponse(null);
                if (audioRef.current) { audioRef.current.pause(); audioRef.current.currentTime = 0; }
                setIsSpeaking(false);
            };

            /* 태그 클릭 */
            const handleTagClick = (tag) => {
                setSearchQuery(tag);
            };

            return (
                <div style={{ minHeight: '100vh' }}>
                    <audio ref={audioRef} style={{ display: 'none' }} />

                    {/* ── Waitlist 모달 ── */}
                    {showWaitlist && <WaitlistModal onClose={() => setShowWaitlist(false)} />}

                    {/* ── Navigation ── */}
                    <nav className="glass-nav" style={{ position: 'sticky', top: 0, zIndex: 50, borderBottom: '1px solid #f1f5f9' }}>
                        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 24px', height: 80, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            {/* Logo */}
                            <div onClick={resetHome} style={{ display:'flex', alignItems:'center', cursor:'pointer', gap: 12 }}>
                                <div style={{ width:40, height:40, background:'#4F46E5', borderRadius:16, display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 10px 25px -5px rgba(79,70,229,0.3)' }}>
                                    <Icon name="ShoppingCart" size={20} color="white" />
                                </div>
                                <div>
                                    <div style={{ fontSize:22, fontWeight:900, letterSpacing:'-0.05em', color:'#4F46E5', lineHeight:1 }}>TRYGO</div>
                                    <div style={{ fontSize:9, fontWeight:700, color:'#94a3b8', letterSpacing:'0.15em', textTransform:'uppercase', marginTop:2 }}>Powered by Asiantic AI</div>
                                </div>
                            </div>
                            {/* Nav Links */}
                            <div style={{ display:'flex', gap:40 }} className="hidden-mobile">
                                {['에이션틱 테크','가격 지수','트렌드 분석'].map(link => (
                                    <a key={link} href="#" style={{ fontSize:12, fontWeight:700, color:'#64748b', textDecoration:'none', letterSpacing:'0.1em', textTransform:'uppercase' }}
                                       onMouseEnter={e=>e.target.style.color='#4F46E5'}
                                       onMouseLeave={e=>e.target.style.color='#64748b'}>{link}</a>
                                ))}
                            </div>
                            <button
                                onClick={() => setShowWaitlist(true)}
                                style={{ padding:'10px 24px', borderRadius:999, background:'#0f172a', color:'white', fontWeight:700, fontSize:14, border:'none', cursor:'pointer', boxShadow:'0 4px 12px rgba(0,0,0,0.15)' }}
                                onMouseEnter={e=>e.currentTarget.style.background='#1e293b'}
                                onMouseLeave={e=>e.currentTarget.style.background='#0f172a'}
                            >시작하기</button>
                        </div>
                    </nav>

                    <main style={{ maxWidth: 1100, margin: '0 auto', padding: '80px 24px' }}>

                        {/* ── HOME ── */}
                        {currentView === 'home' && (
                            <div className="anim-fade-in" style={{ display:'flex', flexDirection:'column', alignItems:'center' }}>
                                {/* Badge */}
                                <div style={{ display:'inline-flex', alignItems:'center', gap:8, padding:'10px 20px', background:'#EEF2FF', color:'#4338CA', borderRadius:999, fontSize:11, fontWeight:900, marginBottom:40, border:'1px solid #C7D2FE' }}>
                                    <Icon name="Cpu" size={14} color="#4338CA" />
                                    <span>Asiantic AI Engine: Intelligent Shopping Advisor</span>
                                </div>

                                {/* Headline */}
                                <h1 style={{ fontSize:'clamp(36px, 7vw, 68px)', fontWeight:700, textAlign:'center', marginBottom:24, letterSpacing:'-0.02em', lineHeight:1.2 }}>
                                    쇼핑의 정답,<br /><span className="gradient-text">에이션틱 AI</span>
                                </h1>
                                <p style={{ color:'#64748b', textAlign:'center', marginBottom:64, maxWidth:600, fontSize:16, fontWeight:400, lineHeight:2.2 }}>
                                    트라이고의 '에이션틱 AI'는 실시간 데이터를 스스로 학습하고 추론하여<br/>당신만을 위한 최적의 구매 시나리오를 제안합니다.
                                </p>

                                {/* Search Box */}
                                <form onSubmit={handleSearch} style={{ width:'100%', maxWidth:800, position:'relative' }}>
                                    <div style={{ position:'absolute', left:28, top:'50%', transform:'translateY(-50%)', pointerEvents:'none', zIndex:1 }}>
                                        <Icon name="BrainCircuit" size={28} color="#818CF8" />
                                    </div>
                                    <input
                                        type="text"
                                        value={searchQuery}
                                        onChange={e => setSearchQuery(e.target.value)}
                                        placeholder="에이션틱 AI에게 분석을 요청하세요..."
                                        style={{
                                            width:'100%', height:90, paddingLeft:72, paddingRight:170,
                                            borderRadius:40, border:'none', background:'white',
                                            boxShadow:'0 20px 60px -15px rgba(0,0,0,0.12)',
                                            fontSize:20, fontWeight:700, color:'#0f172a',
                                            fontFamily:'inherit'
                                        }}
                                    />
                                    <button
                                        type="submit"
                                        style={{
                                            position:'absolute', right:16, top:'50%', transform:'translateY(-50%)',
                                            height:60, padding:'0 32px', borderRadius:28,
                                            background:'#4F46E5', color:'white', border:'none',
                                            fontWeight:900, fontSize:16, cursor:'pointer',
                                            boxShadow:'0 8px 20px rgba(79,70,229,0.35)',
                                            fontFamily:'inherit'
                                        }}
                                        onMouseEnter={e=>e.currentTarget.style.background='#4338CA'}
                                        onMouseLeave={e=>e.currentTarget.style.background='#4F46E5'}
                                    >분석 요청</button>
                                </form>

                                {/* Quick Tags */}
                                <div style={{ marginTop:48, display:'flex', flexWrap:'wrap', justifyContent:'center', gap:12 }}>
                                    {["아이폰 16 자급제", "로봇청소기 추천", "신혼 에스프레소 머신", "다이슨 에어랩"].map(tag => (
                                        <button key={tag} onClick={() => handleTagClick(tag)}
                                            style={{ padding:'10px 20px', background:'white', border:'1px solid #e2e8f0', borderRadius:999, fontSize:13, fontWeight:700, color:'#64748b', cursor:'pointer', fontFamily:'inherit' }}
                                            onMouseEnter={e=>{ e.currentTarget.style.borderColor='#4F46E5'; e.currentTarget.style.color='#4F46E5'; }}
                                            onMouseLeave={e=>{ e.currentTarget.style.borderColor='#e2e8f0'; e.currentTarget.style.color='#64748b'; }}
                                        >{tag}</button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* ── LOADING ── */}
                        {currentView === 'loading' && (
                            <div className="anim-zoom-in" style={{ display:'flex', flexDirection:'column', alignItems:'center', padding:'120px 0' }}>
                                <div style={{ position:'relative', width:120, height:120, display:'flex', alignItems:'center', justifyContent:'center' }}>
                                    <div className="anim-ping" style={{ position:'absolute', inset:0, background:'rgba(79,70,229,0.1)', borderRadius:36, opacity:0.3 }} />
                                    <div style={{ width:120, height:120, background:'white', borderRadius:36, display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 20px 40px -10px rgba(79,70,229,0.15)', border:'3px solid #EEF2FF', position:'relative', zIndex:1 }}>
                                        <div className="anim-spin-slow">
                                            <Icon name="Cpu" size={52} color="#4F46E5" />
                                        </div>
                                    </div>
                                </div>
                                <h2 style={{ fontSize:28, fontWeight:900, textAlign:'center', marginTop:48, color:'#0f172a', lineHeight:1.4 }}>
                                    에이션틱 AI 엔진이<br/>실시간 정보를 스캔하고 있습니다
                                </h2>
                                <p className="anim-pulse" style={{ color:'#94a3b8', marginTop:16, fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', fontSize:11 }}>
                                    Asiantic Reasoning Algorithm
                                </p>
                            </div>
                        )}

                        {/* ── RESULT ── */}
                        {currentView === 'result' && (
                            <div className="anim-fade-in" style={{ maxWidth:900, margin:'0 auto' }}>
                                {/* Back Button */}
                                <button onClick={resetHome}
                                    style={{ display:'flex', alignItems:'center', gap:8, marginBottom:40, background:'none', border:'none', color:'#94a3b8', fontWeight:900, fontSize:15, cursor:'pointer', fontFamily:'inherit', padding:0 }}
                                    onMouseEnter={e=>{ e.currentTarget.style.color='#4F46E5'; }}
                                    onMouseLeave={e=>{ e.currentTarget.style.color='#94a3b8'; }}
                                >
                                    <Icon name="ArrowLeft" size={18} color="currentColor" />
                                    다시 질문하기
                                </button>

                                {/* AI Report Card */}
                                <section className="ai-card-shadow" style={{ background:'white', borderRadius:48, padding:'48px 56px', border:'1px solid #EEF2FF', marginBottom:48, position:'relative', overflow:'hidden' }}>
                                    {/* BG Decoration */}
                                    <div style={{ position:'absolute', top:0, right:0, padding:48, opacity:0.04, pointerEvents:'none' }}>
                                        <Icon name="Sparkles" size={220} color="#4F46E5" />
                                    </div>

                                    {/* Header */}
                                    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:20, marginBottom:40, position:'relative', zIndex:1 }}>
                                        <div style={{ display:'flex', alignItems:'center', gap:20 }}>
                                            <div style={{ padding:16, background:'#4F46E5', borderRadius:24, boxShadow:'0 12px 24px rgba(79,70,229,0.3)' }}>
                                                <Icon name="Cpu" size={28} color="white" />
                                            </div>
                                            <div>
                                                <div style={{ fontSize:26, fontWeight:900, letterSpacing:'-0.03em' }}>에이션틱 AI 분석 리포트</div>
                                                <div style={{ fontSize:10, fontWeight:900, color:'#6366F1', letterSpacing:'0.2em', textTransform:'uppercase', marginTop:4 }}>Intelligent Reasoning by Asiantic</div>
                                            </div>
                                        </div>
                                        <button
                                            onClick={() => speakText(aiResponse?.fullText)}
                                            style={{
                                                display:'flex', alignItems:'center', gap:10, padding:'14px 28px', borderRadius:20,
                                                fontWeight:900, fontSize:15, border:'none', cursor:'pointer', fontFamily:'inherit',
                                                background: isSpeaking ? '#FEF2F2' : '#0f172a',
                                                color: isSpeaking ? '#DC2626' : 'white',
                                                boxShadow: isSpeaking ? '0 4px 12px rgba(220,38,38,0.15)' : '0 8px 20px rgba(0,0,0,0.2)'
                                            }}
                                        >
                                            <Icon name={isSpeaking ? "X" : "Volume2"} size={18} color={isSpeaking ? "#DC2626" : "white"} />
                                            {isSpeaking ? '음성 중단' : '에이션틱 브리핑'}
                                        </button>
                                    </div>

                                    {/* Summary Quote */}
                                    <div style={{ background:'#F5F3FF', borderRadius:24, padding:'28px 32px', marginBottom:32, border:'1px solid rgba(167,139,250,0.2)', position:'relative', zIndex:1 }}>
                                        <p style={{ color:'#1e293b', lineHeight:2.0, fontSize:16, fontWeight:500, fontStyle:'italic', margin:0 }}>
                                            "{aiResponse?.summary}"
                                        </p>
                                    </div>

                                    {/* Full Report Text */}
                                    <div className="report-text" style={{ position:'relative', zIndex:1 }}>
                                        {aiResponse?.fullText}
                                    </div>
                                </section>

                                {/* Product Recommendations */}
                                <div>
                                    <h3 style={{ fontSize:22, fontWeight:900, display:'flex', alignItems:'center', gap:12, marginBottom:24, padding:'0 8px' }}>
                                        <Icon name="Sparkles" size={24} color="#4F46E5" />
                                        에이션틱 AI 큐레이션
                                    </h3>

                                    <div style={{ display:'flex', flexDirection:'column', gap:24 }}>
                                        {products.map(p => (
                                            <div key={p.id}
                                                style={{ background:'white', borderRadius:40, padding:24, border:'1px solid #f1f5f9', display:'flex', gap:28, flexWrap:'wrap', transition:'box-shadow 0.2s, border-color 0.2s', cursor:'default' }}
                                                onMouseEnter={e=>{ e.currentTarget.style.boxShadow='0 20px 40px -10px rgba(79,70,229,0.15)'; e.currentTarget.style.borderColor='#C7D2FE'; }}
                                                onMouseLeave={e=>{ e.currentTarget.style.boxShadow='none'; e.currentTarget.style.borderColor='#f1f5f9'; }}
                                            >
                                                {/* Product Image */}
                                                <div style={{ width:240, height:240, minWidth:200, borderRadius:28, overflow:'hidden', position:'relative', background:'#f8fafc', flexShrink:0 }}>
                                                    <img src={p.image} alt={p.name} style={{ width:'100%', height:'100%', objectFit:'cover', transition:'transform 0.5s' }}
                                                         onMouseEnter={e=>e.currentTarget.style.transform='scale(1.08)'}
                                                         onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}
                                                    />
                                                    <div style={{ position:'absolute', top:14, left:14, background:'#4F46E5', color:'white', padding:'6px 14px', borderRadius:14, fontSize:10, fontWeight:900, letterSpacing:'0.1em', textTransform:'uppercase' }}>
                                                        Asiantic {p.score}%
                                                    </div>
                                                </div>

                                                {/* Product Info */}
                                                <div style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'space-between', padding:'8px 0' }}>
                                                    <div>
                                                        <div style={{ display:'flex', gap:8, marginBottom:16, flexWrap:'wrap' }}>
                                                            {p.tags.map(t => (
                                                                <span key={t} style={{ padding:'6px 14px', background:'#EEF2FF', color:'#4338CA', fontSize:10, fontWeight:900, borderRadius:10, letterSpacing:'0.08em', textTransform:'uppercase' }}>{t}</span>
                                                            ))}
                                                        </div>
                                                        <h4 style={{ fontSize:26, fontWeight:900, color:'#0f172a', margin:'0 0 12px', letterSpacing:'-0.03em', lineHeight:1.2 }}>{p.name}</h4>
                                                        <div style={{ display:'flex', alignItems:'center', color:'#94a3b8', fontWeight:700, fontSize:14, gap:4 }}>
                                                            <Icon name="Star" size={16} color="#FBBF24" />
                                                            <span style={{ color:'#334155' }}>4.9점</span>
                                                            <span style={{ margin:'0 8px', color:'#e2e8f0' }}>|</span>
                                                            <span>실시간 재고 반영됨</span>
                                                        </div>
                                                    </div>

                                                    <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', marginTop:24, flexWrap:'wrap', gap:16 }}>
                                                        <div>
                                                            <div style={{ fontSize:11, fontWeight:900, color:'#cbd5e1', letterSpacing:'0.15em', textTransform:'uppercase', marginBottom:4 }}>실시간 최적가</div>
                                                            <div style={{ fontSize:36, fontWeight:900, color:'#4F46E5', letterSpacing:'-0.04em' }}>{p.price}</div>
                                                        </div>
                                                        <button style={{ padding:'18px 36px', background:'#4F46E5', color:'white', borderRadius:20, border:'none', fontWeight:900, fontSize:16, cursor:'pointer', boxShadow:'0 8px 20px rgba(79,70,229,0.25)', fontFamily:'inherit' }}
                                                            onMouseEnter={e=>e.currentTarget.style.background='#4338CA'}
                                                            onMouseLeave={e=>e.currentTarget.style.background='#4F46E5'}
                                                        >보러가기</button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* CTA */}
                                <div style={{ marginTop:80, background:'#0f172a', borderRadius:56, padding:'80px 64px', color:'white', textAlign:'center', position:'relative', overflow:'hidden' }}>
                                    <div style={{ position:'absolute', top:0, right:0, width:'33%', height:'100%', background:'linear-gradient(to left, rgba(99,102,241,0.1), transparent)', pointerEvents:'none' }} />
                                    <div style={{ position:'absolute', bottom:-160, right:-160, width:480, height:480, background:'rgba(99,102,241,0.08)', borderRadius:'50%', filter:'blur(120px)', pointerEvents:'none' }} />
                                    <div style={{ position:'relative', zIndex:1 }}>
                                        <div style={{ width:80, height:80, background:'#4F46E5', borderRadius:24, display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 40px', border:'1px solid rgba(255,255,255,0.1)', boxShadow:'0 12px 30px rgba(79,70,229,0.4)' }}>
                                            <Icon name="Cpu" size={36} color="white" />
                                        </div>
                                        <h3 style={{ fontSize:'clamp(28px,5vw,48px)', fontWeight:900, marginBottom:24, lineHeight:1.3 }}>
                                            에이션틱 AI와<br/>더 깊은 대화를 나누세요.
                                        </h3>
                                        <p style={{ color:'#94a3b8', fontSize:17, marginBottom:48, fontWeight:500, maxWidth:480, margin:'0 auto 48px', lineHeight:1.8 }}>
                                            에이션틱 AI의 추론 모델은 당신의 취향과 라이프스타일을 분석하여 가장 완벽한 쇼핑 가이드를 제공합니다.
                                        </p>
                                        <button style={{ padding:'20px 48px', background:'white', color:'#0f172a', borderRadius:20, border:'none', fontWeight:900, fontSize:18, cursor:'pointer', boxShadow:'0 8px 30px rgba(0,0,0,0.3)', fontFamily:'inherit' }}
                                            onMouseEnter={e=>e.currentTarget.style.background='#EEF2FF'}
                                            onMouseLeave={e=>e.currentTarget.style.background='white'}
                                        >✨ 에이션틱 AI와 채팅하기</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* ── Footer ── */}
                    <footer style={{ borderTop:'1px solid #f1f5f9', padding:'80px 0', background:'white', marginTop:80 }}>
                        <div style={{ maxWidth:1280, margin:'0 auto', padding:'0 24px', display:'flex', flexWrap:'wrap', justifyContent:'space-between', alignItems:'center', gap:24 }}>
                            <div style={{ display:'flex', alignItems:'center', gap:8, opacity:0.4 }}>
                                <Icon name="ShoppingCart" size={22} color="#4F46E5" />
                                <span style={{ fontSize:22, fontWeight:900, letterSpacing:'-0.05em' }}>TRYGO</span>
                            </div>
                            <p style={{ color:'#cbd5e1', fontSize:9, fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', textAlign:'center' }}>
                                © 2025 TRYGO &amp; ASIANTIC AI. ALL RIGHTS RESERVED.
                            </p>
                            <div style={{ display:'flex', gap:32 }}>
                                {['Privacy','Terms','Contact'].map(link => (
                                    <a key={link} href="#" style={{ fontSize:11, fontWeight:900, color:'#cbd5e1', textDecoration:'none', letterSpacing:'0.1em', textTransform:'uppercase' }}
                                       onMouseEnter={e=>e.target.style.color='#4F46E5'}
                                       onMouseLeave={e=>e.target.style.color='#cbd5e1'}
                                    >{link}</a>
                                ))}
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        @media (max-width: 640px) {
            .hidden-mobile { display: none !important; }
        }
    </style>
</body>
</html>
